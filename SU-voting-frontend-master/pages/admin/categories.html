<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Categories - UNIDEL Voting System</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <script src="/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/header.js"></script>

  <main class="container">
    <div class="admin-container">
      <div class="admin-header">
        <h1>Manage Categories</h1>
        <button class="btn btn-primary" id="newCategoryBtn">+ New Category</button>
      </div>

      <!-- New/Edit Category Form -->
      <div id="categoryFormContainer" class="form-container card" style="display: none;">
        <div class="card-header">
          <h3 id="formTitle">New Category</h3>
        </div>
        <form id="categoryForm" class="admin-form">
          <div class="form-group">
            <label for="categoryTitle">Title *</label>
            <input
              type="text"
              id="categoryTitle"
              name="title"
              placeholder="Category title"
              required
            >
            <span class="form-error" id="title-error"></span>
          </div>

          <div class="form-group">
            <label for="categoryDesc">Description</label>
            <textarea
              id="categoryDesc"
              name="description"
              placeholder="Category description (optional)"
              rows="4"
            ></textarea>
          </div>

          <div id="formError" class="form-error alert-error" style="display: none;"></div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submitCategoryBtn">
              Save Category
            </button>
            <button type="button" class="btn btn-secondary" id="cancelCategoryBtn">
              Cancel
            </button>
          </div>
        </form>
      </div>

      <!-- Categories List -->
      <div id="categoriesContent" class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading categories...</p>
      </div>
    </div>
  </main>

  <script src="/js/admin-categories.js"></script>
</body>
</html>
