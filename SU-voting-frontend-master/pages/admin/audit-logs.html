<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Logs - UNIDEL Voting System</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <script src="/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/header.js"></script>

  <main class="container">
    <div class="admin-container">
      <div class="admin-header">
        <h1>Audit Logs</h1>
        <p>Complete voting activity log</p>
      </div>

      <div class="logs-filter">
        <input
          type="text"
          id="filterInput"
          class="filter-input"
          placeholder="Filter by name, matric number, or action..."
          autocomplete="off"
        >
      </div>

      <div id="logsContent" class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading audit logs...</p>
      </div>
    </div>
  </main>

  <script src="/js/admin-audit-logs.js"></script>
</body>
</html>
